<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP CORE - Öğrenci Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --sidebar-dark: #111827;
            --accent-blue: #38bdf8;
            --text-gray: #94a3b8;
            --text-bright: #e2e8f0;
            --danger-red: #f87171;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-bright);
            margin: 0;
            overflow-x: hidden;
        }

        /* Seçilemeyen metinler için varsayılan imleç */
        .no-select {
            cursor: default !important;
            user-select: none !important;
            -webkit-user-select: none;
        }

        #sidebar {
            width: 300px;
            background: var(--sidebar-dark);
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 40px 20px;
            text-align: center;
        }

            .sidebar-header i {
                font-size: 3rem;
                color: var(--accent-blue);
                margin-bottom: 12px;
                display: block;
            }

            .sidebar-header h4 {
                color: white;
                letter-spacing: 1px;
            }

            .sidebar-header .sub-label {
                color: var(--text-bright);
                font-size: 0.8rem;
                opacity: 0.8;
            }

        .user-profile {
            background: #0f172a;
            padding: 25px 15px;
            border-radius: 20px;
            margin: 10px 20px 30px 20px;
            border: 1px solid #334155;
            text-align: center;
        }

            .user-profile .avatar-circle {
                width: 60px;
                height: 60px;
                background: rgba(56, 189, 248, 0.1);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 15px auto;
                border: 1px solid var(--accent-blue);
            }

                .user-profile .avatar-circle i {
                    font-size: 24px;
                    color: var(--accent-blue);
                }

        .nav-link {
            color: var(--text-gray) !important;
            padding: 14px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
            border-radius: 12px;
            margin: 4px 15px;
            text-decoration: none;
            cursor: pointer; /* Linkler için el işareti */
        }

            .nav-link:hover, .nav-link.active {
                background: rgba(56, 189, 248, 0.1);
                color: var(--accent-blue) !important;
            }

        .logout-container {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid #334155;
        }

        .btn-logout {
            background: var(--danger-red);
            border: none;
            color: #0f172a !important;
            font-weight: 700;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
            cursor: pointer !important; /* El işareti özelliği eklendi */
        }

            .btn-logout:hover {
                background: #fb923c;
                transform: translateY(-2px);
                box-shadow: 0 10px 20px -5px rgba(248, 113, 113, 0.4);
                color: white !important;
            }

        .content {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .welcome-section h2 {
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
        }

        .pc-card {
            background: var(--card-dark);
            border-radius: 24px;
            border: 1px solid #334155;
            overflow: hidden;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            height: 100%;
        }

            .pc-card:hover {
                transform: translateY(-5px);
                border-color: var(--accent-blue);
            }

        .pc-card-header {
            background: linear-gradient(135deg, #1e293b 0%, #111827 100%);
            padding: 20px 25px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pc-card-body {
            padding: 25px;
        }

        .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .spec-label {
            color: var(--text-gray);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spec-value {
            font-weight: 600;
            color: white;
            font-size: 0.9rem;
        }

        .badge-feature {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .alert-custom {
            background: var(--card-dark);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            border: 1px solid #334155;
            width: 100%;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #334155;
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header no-select">
            <i class="fas fa-terminal"></i>
            <h4 class="fw-bold mb-0">LRP CORE</h4>
            <div class="sub-label">Laboratuvar Kaynak Planlama</div>
        </div>

        <div class="user-profile no-select">
            <div class="avatar-circle">
                <i class="fas fa-user-graduate"></i>
            </div>
            <span id="stNameDisplay" class="fw-bold">Yükleniyor...</span>
            <div class="text-primary small fw-bold">ÖĞRENCİ PANELİ</div>
        </div>

        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a class="nav-link active" href="#">
                    <i class="fas fa-desktop"></i> Zimmetli Cihazlarım
                </a>
            </li>
        </ul>

        <div class="logout-container">
            <a class="btn-logout" href="login.html" onclick="localStorage.clear()">
                <i class="fas fa-sign-out-alt"></i> Güvenli Çıkış
            </a>
        </div>
    </div>

    <div class="content">
        <div class="welcome-section">
            <h2 id="welcomeText" class="no-select">Hoş Geldiniz</h2>
            <p class="no-select">
                <span class="status-text">Sistem durumu:</span>
                <span class="text-success fw-bold ms-1">
                    <i class="fas fa-shield-alt me-1"></i> Aktif Bağlantı
                </span>
            </p>
        </div>

        <div id="pcContainer" class="row g-4">
            <div class="col-12">
                <div class="alert-custom">
                    <div class="spinner-grow text-primary me-3" role="status" style="width: 1.5rem; height: 1.5rem;"></div>
                    <span class="no-select">Verileriniz güvenli kanaldan çekiliyor...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const role = localStorage.getItem('userRole');
            const username = localStorage.getItem('username');
            const fullName = localStorage.getItem('userName') || "Öğrenci";

            if (role !== 'Student' || !username) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('stNameDisplay').textContent = fullName;
            document.getElementById('welcomeText').textContent = `Hoş Geldin, ${fullName.split(' ')[0]}`;

            try {
                const res = await fetch(`/api/my-pc/${username}`);
                const pcContainer = document.getElementById('pcContainer');

                if (res.ok) {
                    const data = await res.json();

                    if (!data || (Array.isArray(data) && data.length === 0)) {
                        showNoDeviceAlert();
                        return;
                    }

                    const devices = Array.isArray(data) ? data : [data];
                    pcContainer.innerHTML = '';

                    devices.forEach(pc => {
                        pcContainer.innerHTML += `
                                    <div class="col-12 col-md-6 col-xxl-4">
                                        <div class="pc-card">
                                            <div class="pc-card-header no-select">
                                                <div>
                                                    <h5 class="mb-0 fw-bold text-white">Zimmetli Cihaz</h5>
                                                    <small class="text-muted">Varlık Kodu: ${pc.assetCode || 'Bilinmiyor'}</small>
                                                </div>
                                                <i class="fas fa-laptop-code fa-2x text-primary"></i>
                                            </div>
                                            <div class="pc-card-body">
                                                <div class="spec-item">
                                                    <span class="spec-label no-select"><i class="fas fa-tag text-primary"></i>Marka / Model</span>
                                                    <span class="spec-value">${pc.brand || '-'}</span>
                                                </div>
                                                <div class="spec-item">
                                                    <span class="spec-label no-select"><i class="fas fa-microchip text-primary"></i>İşlemci</span>
                                                    <span class="spec-value">${pc.processor || '-'}</span>
                                                </div>
                                                <div class="spec-item">
                                                    <span class="spec-label no-select"><i class="fas fa-memory text-primary"></i>Bellek (RAM)</span>
                                                    <span class="spec-value">${pc.ram || '-'}</span>
                                                </div>
                                                <div class="mt-4 pt-3 border-top border-secondary border-opacity-10">
                                                    <div class="d-flex gap-2 flex-wrap">
                                                        <div class="badge-feature no-select">
                                                            <i class="fas ${pc.hasHDMI ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'} me-2"></i>HDMI
                                                        </div>
                                                        <div class="badge-feature no-select">
                                                            <i class="fas ${pc.hasVeyon ? 'fa-check-circle text-success' : 'fa-times-circle text-danger'} me-2"></i>Veyon Cloud
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>`;
                    });
                } else {
                    showNoDeviceAlert();
                }
            } catch (error) {
                console.error("Hata:", error);
                document.getElementById('pcContainer').innerHTML = `
                            <div class="col-12">
                                <div class="alert-custom border-danger text-danger">
                                    <i class="fas fa-wifi me-3 fa-2x"></i>
                                    <span class="no-select text-white">Bağlantı hatası: Sunucuya ulaşılamıyor.</span>
                                </div>
                            </div>`;
            }
        });

        function showNoDeviceAlert() {
            document.getElementById('pcContainer').innerHTML = `
                        <div class="col-12">
                            <div class="alert-custom border-warning text-warning">
                                <i class="fas fa-exclamation-triangle me-3 fa-2x"></i>
                                <div class="d-flex flex-column">
                                    <span class="no-select text-white fw-bold">Henüz zimmetli bir cihazınız bulunmuyor.</span>
                                    <small class="text-muted">Cihaz ataması için laboratuvar sorumlusuyla görüşün.</small>
                                </div>
                            </div>
                        </div>`;
        }
    </script>
</body>
</html>
